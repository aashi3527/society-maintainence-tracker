<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Society Maintenance Tracker</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .auth-container {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .auth-card {
      width: 100%;
      max-width: 400px;
    }
    .tab-nav {
      display: flex;
      margin-bottom: 20px;
      border-bottom: 1px solid #334155;
    }
    .tab-btn {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      font-weight: bold;
      text-align: center;
    }
    .tab-btn.active {
      color: white;
      border-bottom: 2px solid #2563eb;
    }
    .error-msg {
      background: rgba(244, 63, 94, 0.15);
      border: 1px solid #f43f5e;
      color: #f43f5e;
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 16px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="card auth-card">
      <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="font-weight: 800;">Society Tracker</h2>
        <p style="color: #94a3b8; font-size: 0.85rem; margin-top: 4px;">Maintenance & Complaint System</p>
      </div>

      <div class="tab-nav">
        <button class="tab-btn active" id="loginTabBtn" onclick="showTab('login')">Log In</button>
        <button class="tab-btn" id="registerTabBtn" onclick="showTab('register')">Register</button>
      </div>

      <div class="error-msg" id="authError"></div>

      <!-- Login Form -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="loginIdent">Username or Email</label>
          <input type="text" id="loginIdent" class="form-control" placeholder="resident@society.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="loginPass">Password</label>
          <input type="password" id="loginPass" class="form-control" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Log In</button>
      </form>

      <!-- Register Form -->
      <form id="registerForm" onsubmit="handleRegister(event)" style="display: none;">
        <div class="form-group">
          <label class="form-label">Role Type</label>
          <div style="display: flex; gap: 8px;">
            <label style="flex: 1; display: flex; align-items: center; justify-content: center; background: #0f172a; border: 1px solid #475569; padding: 10px; border-radius: 6px; cursor: pointer;">
              <input type="radio" name="regRole" value="resident" checked onclick="toggleRoleFields('resident')" style="margin-right: 6px; accent-color: #2563eb;"> Resident
            </label>
            <label style="flex: 1; display: flex; align-items: center; justify-content: center; background: #0f172a; border: 1px solid #475569; padding: 10px; border-radius: 6px; cursor: pointer;">
              <input type="radio" name="regRole" value="admin" onclick="toggleRoleFields('admin')" style="margin-right: 6px; accent-color: #2563eb;"> Admin
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="regUsername">Username</label>
          <input type="text" id="regUsername" class="form-control" placeholder="john_doe" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regEmail">Email Address</label>
          <input type="email" id="regEmail" class="form-control" placeholder="john@domain.com" required>
        </div>
        <div class="form-group">
          <label class="form-label" for="regPass">Password</label>
          <input type="password" id="regPass" class="form-control" placeholder="••••••••" required>
        </div>

        <!-- Resident Unit Input -->
        <div class="form-group" id="unitField">
          <label class="form-label" for="regUnit">Unit / Apartment Number</label>
          <input type="text" id="regUnit" class="form-control" placeholder="e.g. A-104">
        </div>

        <!-- Admin Code Input -->
        <div class="form-group" id="adminCodeField" style="display: none;">
          <label class="form-label" for="regAdminCode">Admin Invitation Code</label>
          <input type="password" id="regAdminCode" class="form-control" placeholder="Enter admin invite code">
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Create Account</button>
      </form>
    </div>
  </div>

  <script>
    // Tab toggling
    function showTab(type) {
      document.getElementById('authError').style.display = 'none';
      if (type === 'login') {
        document.getElementById('loginTabBtn').classList.add('active');
        document.getElementById('registerTabBtn').classList.remove('active');
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
      } else {
        document.getElementById('registerTabBtn').classList.add('active');
        document.getElementById('loginTabBtn').classList.remove('active');
        document.getElementById('registerForm').style.display = 'block';
        document.getElementById('loginForm').style.display = 'none';
      }
    }

    // Role-specific fields toggling
    function toggleRoleFields(role) {
      if (role === 'resident') {
        document.getElementById('unitField').style.display = 'block';
        document.getElementById('regUnit').required = true;
        document.getElementById('adminCodeField').style.display = 'none';
        document.getElementById('regAdminCode').required = false;
      } else {
        document.getElementById('unitField').style.display = 'none';
        document.getElementById('regUnit').required = false;
        document.getElementById('adminCodeField').style.display = 'block';
        document.getElementById('regAdminCode').required = true;
      }
    }

    // Initialize required state
    toggleRoleFields('resident');

    // API Handlers
    async function handleLogin(e) {
      e.preventDefault();
      const emailOrUsername = document.getElementById('loginIdent').value;
      const password = document.getElementById('loginPass').value;
      const errorDiv = document.getElementById('authError');
      errorDiv.style.display = 'none';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ emailOrUsername, password })
        });
        const data = await res.json();
        
        if (!res.ok) {
          errorDiv.innerText = data.error || 'Login failed.';
          errorDiv.style.display = 'block';
          return;
        }

        window.location.href = '/';
      } catch (err) {
        errorDiv.innerText = 'Failed to connect to server.';
        errorDiv.style.display = 'block';
      }
    }

    async function handleRegister(e) {
      e.preventDefault();
      const username = document.getElementById('regUsername').value;
      const email = document.getElementById('regEmail').value;
      const password = document.getElementById('regPass').value;
      const role = document.querySelector('input[name="regRole"]:checked').value;
      const unit_number = document.getElementById('regUnit').value;
      const admin_code = document.getElementById('regAdminCode').value;
      const errorDiv = document.getElementById('authError');
      errorDiv.style.display = 'none';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, email, password, role, unit_number, admin_code })
        });
        const data = await res.json();

        if (!res.ok) {
          errorDiv.innerText = data.error || 'Registration failed.';
          errorDiv.style.display = 'block';
          return;
        }

        window.location.href = '/';
      } catch (err) {
        errorDiv.innerText = 'Failed to connect to server.';
        errorDiv.style.display = 'block';
      }
    }
  </script>
</body>
</html>
